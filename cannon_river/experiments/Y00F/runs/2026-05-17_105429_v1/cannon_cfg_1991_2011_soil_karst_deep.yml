# cannon_cfg_1991_2011_soil_karst_deep.yml
# 3-reservoir hydroRaVENS config for X-series experiments: soil + karst + deep.
# No shallow reservoir. ET drawn entirely from soil (et_alpha=1.0 passed by driver).
# deep reservoir is a linear regional groundwater store (b=1.0 fixed).
# Physical parameters overridden by Dakota driver after initialization.

timeseries:
  datafile: Cannon1991-2011Input.csv

initial_conditions:
  water_reservoir_effective_depths__mm:
    - 100     # soil-zone reservoir   (overridden by HydrographSeparation init)
    - 2000    # karst / bedrock       (overridden by HydrographSeparation init)
    - 50000   # deep groundwater      (overridden by HydrographSeparation init)
  snowpack__mm_SWE: 0

catchment:
  drainage_basin_area__km2: 3800
  evapotranspiration_method: ThorntwaiteChang2019
  water_year_start_month: 10
  baseflow_Q: 0.0             # mm/day; overridden by driver

general:
  spin_up_cycles: 0  # driver.py performs spin-up after setting calibrated parameters
  et_alpha: 1.0      # all ET from soil reservoir (first); overridden by driver

reservoirs:
  e_folding_residence_times__days:
    - 200      # soil zone     (placeholder; overridden by driver)
    - 3650     # karst         (placeholder; overridden by driver)
    - 100000   # deep gw       (placeholder; overridden by driver)
  exfiltration_fractions:
    - 0.1     # soil zone: fraction to stream vs. recharging karst (overridden)
    - 0.7     # karst: fraction to stream vs. recharging deep      (overridden)
    - 1.0     # deep: deepest layer, must be 1.0 for mass conservation
  maximum_effective_depths__mm:
    - .inf    # soil zone: PDM controls saturation-excess, not Hmax
    - .inf    # karst: no saturation-excess threshold
    - .inf    # deep: no saturation-excess threshold

snowmelt:
  PDD_melt_factor: 1.0   # mm SWE per positive degC per day (placeholder; overridden)
  fgi_decay_coeff: 1.0   # no passive decay; FGI driven by temperature only
  snow_insulation_k: 0.0 # mm⁻¹ SWE; 0 = no insulation; overridden by driver if active

modules:
  snowpack:          true
  frozen_ground:     true
  rain_on_snow:      true
  direct_runoff:     false
  dtr_fgi_decay:     false
  et_reservoir_draw: true
