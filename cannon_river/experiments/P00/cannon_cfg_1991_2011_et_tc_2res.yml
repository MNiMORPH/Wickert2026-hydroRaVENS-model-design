# cannon_cfg_1991_2011_et_tc_2res.yml
# hydroRaVENS config for 1991-2011 Cannon River calibration — 2-reservoir variant.
# Shallow zone + soil/groundwater zone; no karst/bedrock reservoir.
# ET computed internally via Thornthwaite-Chang (2019) from T_max, T_min, photoperiod.
# Physical parameters overridden by Dakota driver after initialize().

timeseries:
  datafile: Cannon1991-2011Input.csv

initial_conditions:
  water_reservoir_effective_depths__mm:
    - 0.1     # shallow / overland-flow reservoir
    - 100     # soil-zone / groundwater reservoir
  snowpack__mm_SWE: 0

catchment:
  drainage_basin_area__km2: 3800
  evapotranspiration_method: ThorntwaiteChang2019
  water_year_start_month: 10
  baseflow_Q: 0.0             # mm/day; overridden by driver

general:
  spin_up_cycles: 0  # driver.py performs spin-up after setting calibrated parameters

reservoirs:
  e_folding_residence_times__days:
    - 16      # shallow / overland-flow (placeholder; overridden by driver)
    - 200     # soil / groundwater      (placeholder; overridden by driver)
  exfiltration_fractions:
    - 0.8     # shallow: fraction to stream vs. infiltrating to soil zone (overridden)
    - 1.0     # soil: deepest layer, must be 1.0 for mass conservation
  maximum_effective_depths__mm:
    - .inf    # shallow: no hard cap; PDM and/or tile handle heterogeneity
    - .inf    # soil: no saturation-excess threshold

snowmelt:
  PDD_melt_factor: 1.0   # mm SWE per positive degC per day (placeholder; overridden)
  fgi_decay_coeff: 1.0   # no passive decay; FGI driven by temperature only
  snow_insulation_k: 0.0 # mm⁻¹ SWE; 0 = no insulation; overridden by driver if active

modules:
  snowpack:      true
  frozen_ground: true
  rain_on_snow:  true
  direct_runoff: false
  dtr_fgi_decay: false
