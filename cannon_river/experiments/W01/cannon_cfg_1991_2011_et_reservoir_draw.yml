# cannon_cfg_1991_2011_et_reservoir_draw.yml
# hydroRaVENS config for V series: reservoir-draw ET with alpha=0.3 fixed.
# et_alpha: fraction of ET_pot drawn from the shallow reservoir;
#           remainder (1-alpha) drawn from the soil reservoir.
# Physical parameters overridden by Dakota driver after initialize().

timeseries:
  datafile: Cannon1991-2011Input.csv

initial_conditions:
  water_reservoir_effective_depths__mm:
    - 0.1     # shallow / overland-flow reservoir
    - 100     # soil-zone reservoir
    - 2000    # karst / bedrock reservoir
  snowpack__mm_SWE: 0

catchment:
  drainage_basin_area__km2: 3800
  evapotranspiration_method: ThorntwaiteChang2019
  water_year_start_month: 10
  baseflow_Q: 0.0             # mm/day; overridden by driver

general:
  spin_up_cycles: 0  # driver.py performs spin-up after setting calibrated parameters
  et_alpha: 0.3      # fraction of ET drawn from shallow reservoir (V00: fixed design choice)

reservoirs:
  e_folding_residence_times__days:
    - 16      # shallow / overland-flow (placeholder; overridden by driver)
    - 200     # soil zone              (placeholder; overridden by driver)
    - 3650    # karst / bedrock        (placeholder; overridden by driver)
  exfiltration_fractions:
    - 0.8     # shallow: fraction to stream vs. percolating to soil zone (overridden)
    - 0.1     # soil zone: fraction to stream vs. recharging karst      (overridden)
    - 1.0     # karst: deepest layer, must be 1.0 for mass conservation
  maximum_effective_depths__mm:
    - .inf    # shallow: Hmax overridden by driver (saturation-excess threshold)
    - .inf    # soil zone: no saturation-excess threshold
    - .inf    # karst: no saturation-excess threshold

snowmelt:
  PDD_melt_factor: 1.0   # mm SWE per positive degC per day (placeholder; overridden)
  fgi_decay_coeff: 1.0   # no passive decay; FGI driven by temperature only
  snow_insulation_k: 0.0 # mm⁻¹ SWE; 0 = no insulation; overridden by driver if active

modules:
  snowpack:      true
  frozen_ground: true
  rain_on_snow:  true
  direct_runoff: false
  dtr_fgi_decay: false
